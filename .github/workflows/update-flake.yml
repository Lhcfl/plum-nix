name: Update Flake Inputs

on:
  schedule:
    - cron: "0 0 * * 1"  # 每周一 UTC 00:00
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Update flake inputs
        run: nix flake update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(nix): update flake inputs"
          title: "chore(nix): update flake inputs"
          body: |
            Automated update of flake.nix inputs.

            This PR was created by a GitHub Action running on a weekly schedule.
          branch: nix-flake-update
          delete-branch: true
