name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Flake check
        run: nix flake check

  test-home-manager-module:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Build home-manager module test
        run: |
          mkdir -p /tmp/test
          cat > /tmp/test/flake.nix << 'EOF'
          {
            inputs = {
              nixpkgs.url = "github:NixOS/nixpkgs/nixos-unstable";
              home-manager.url = "github:nix-community/home-manager";
              home-manager.inputs.nixpkgs.follows = "nixpkgs";
              plum-nix.url = "github:NixOS/nixpkgs/nixos-unstable";
            };

            outputs = { nixpkgs, home-manager, plum-nix, ... }:
            let
              system = "x86_64-linux";
              pkgs = nixpkgs.legacyPackages.${system};
              conf = home-manager.lib.homeManagerConfiguration {
                inherit pkgs;
                modules = [
                  plum-nix.homeModules.default
                  {
                    plum-nix = {
                      enable = true;
                      type = "fcitx5";
                      schemas = [ "luna_pinyin" ];
                    };
                    home.username = "test";
                    home.homeDirectory = "/home/test";
                    home.stateVersion = "24.05";
                  }
                ];
              };
            in {
              packages.${system}.default = conf.activationPackage;
            };
          }
          EOF
          nix build ".#packages.x86_64-linux.default" \
            --override-input plum-nix "path:${GITHUB_WORKSPACE}" \
            --print-build-logs --no-link
        working-directory: /tmp/test
